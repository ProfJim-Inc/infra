apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
  labels:
    team: platform
    tier: internal
spec:
  project: creatium

  source:
    repoURL: https://nvidia.github.io/k8s-device-plugin
    chart: nvidia-device-plugin
    targetRevision: "0.x"
    helm:
      values: |
        # Only run on GPU nodes
        nodeSelector:
          pool: gpu
        # Tolerate the GPU taint so the DaemonSet can schedule on GPU nodes
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
