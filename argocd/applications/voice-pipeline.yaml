apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voice-pipeline
  namespace: argocd
  labels:
    team: backend
    tier: internal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Image tag is updated by CI workflow in the voice-pipeline repo
spec:
  project: creatium

  sources:
    # Source 1: The shared Helm chart
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/charts/creatium-service
      helm:
        valueFiles:
          - $values/kubernetes/base/voice-pipeline/values.yaml

    # Source 2: The per-service values file (referenced as $values above)
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      ref: values

    # Source 3: Raw manifests (PrometheusRule + AlertmanagerConfig)
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/base/voice-pipeline
      directory:
        include: "{alerts,alertmanager-config}.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
