apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-worker-bg
  namespace: argocd
  labels:
    team: backend
    tier: internal
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/creatium/agent-backend
    argocd-image-updater.argoproj.io/app.update-strategy: semver
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: creatium

  sources:
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/charts/creatium-service
      helm:
        valueFiles:
          - $values/kubernetes/base/agent-worker-bg/values.yaml

    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      ref: values

    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/base/agent-worker-bg
      directory:
        include: "{alerts,alertmanager-config}.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
