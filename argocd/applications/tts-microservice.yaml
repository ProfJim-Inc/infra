apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tts-microservice
  namespace: argocd
  labels:
    team: backend
    tier: customer-facing
  annotations:
    # ── ArgoCD Image Updater ────────────────────────────────────────────────
    # Watches ghcr.io/profjim-inc/tts-microservice for new semver tags (e.g. 1.2.3).
    # When a newer tag is found, writes it back to the values file in git and
    # ArgoCD auto-syncs the new image — fully GitOps, no manual tag bumps.
    #
    # Pre-requisites (one-time, per cluster):
    #   1. argocd-image-updater must be installed (see argocd/applications/argocd-image-updater.yaml)
    #   2. A git write-back secret must exist in the argocd namespace:
    #        kubectl create secret generic argocd-image-updater-secret \
    #          -n argocd \
    #          --from-literal=username=<github-user> \
    #          --from-literal=password=<github-pat>   (needs repo write access)
    #   3. ghcr-pull-secret must exist in the argocd namespace (for registry auth):
    #        kubectl create secret docker-registry ghcr-pull-secret \
    #          -n argocd \
    #          --docker-server=ghcr.io \
    #          --docker-username=<github-user> \
    #          --docker-password=<github-pat>
    argocd-image-updater.argoproj.io/image-list: tts=ghcr.io/profjim-inc/tts-microservice
    argocd-image-updater.argoproj.io/tts.update-strategy: semver
    argocd-image-updater.argoproj.io/tts.allow-tags: regexp:^[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/tts.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/tts.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/tts.pull-secret: pullsecret:argocd/ghcr-pull-secret
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues:kubernetes/base/tts-microservice/values.yaml"
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: creatium

  sources:
    # Source 1: The shared Helm chart + per-service values
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/charts/creatium-service
      helm:
        valueFiles:
          - $values/kubernetes/base/tts-microservice/values.yaml

    # Source 2: Per-service values file (referenced as $values above)
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      ref: values

    # Source 3: Raw manifests (PrometheusRule + AlertmanagerConfig + Grafana dashboard)
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/base/tts-microservice
      directory:
        include: "{alerts,alertmanager-config,grafana-dashboard,sealed-secret}.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: production

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
