apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voice-pipeline-stage
  namespace: argocd
  labels:
    team: backend
    tier: internal
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: creatium

  sources:
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/charts/creatium-service
      helm:
        valueFiles:
          - $values/kubernetes/base/voice-pipeline/values-stage.yaml
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/base/voice-pipeline
      directory:
        include: "{alerts,alertmanager-config,grafana-dashboard,sealed-secret,keda-scaledobject-stage}.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
