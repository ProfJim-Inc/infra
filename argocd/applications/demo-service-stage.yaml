apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-service-stage
  namespace: argocd
  labels:
    team: platform
    tier: internal
    environment: staging
  # No Image Updater annotations — staging uses CI-driven SHA writeback
spec:
  project: creatium

  sources:
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/charts/creatium-service
      helm:
        valueFiles:
          - $values/kubernetes/base/demo-service/values-stage.yaml
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/ProfJim-Inc/infra.git
      targetRevision: main
      path: kubernetes/base/demo-service
      directory:
        include: "{alerts,alertmanager-config}.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
