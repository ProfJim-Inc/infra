apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: creatium
  namespace: argocd
spec:
  description: "Creatium production and staging services"

  # Only allow deploying to these namespaces
  destinations:
    - namespace: production
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: internal
      server: https://kubernetes.default.svc
    - namespace: data
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: logging
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: ingress-nginx
      server: https://kubernetes.default.svc
    - namespace: keda
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  # Only allow deploying from our infra repo and approved Helm charts
  sourceRepos:
    - "https://github.com/ProfJim-Inc/infra.git"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://opensearch-project.github.io/helm-charts"
    - "https://fluent.github.io/helm-charts"
    - "https://kubernetes.github.io/ingress-nginx"
    - "https://bitnami-labs.github.io/sealed-secrets"
    - "https://kedacore.github.io/charts"
    - "https://nvidia.github.io/k8s-device-plugin"
    - "https://grafana.github.io/helm-charts"
    - "https://open-telemetry.github.io/opentelemetry-helm-charts"
    - "https://charts.bitnami.com/bitnami"
    - "https://charts.jetstack.io"
    - "https://argoproj.github.io/argo-helm"

  # Allow these Kubernetes resource types
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
    - group: keda.sh
      kind: ClusterTriggerAuthentication
    - group: apiregistration.k8s.io
      kind: APIService
    - group: cert-manager.io
      kind: ClusterIssuer

  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: networking.k8s.io
      kind: "*"
    - group: autoscaling
      kind: "*"
    - group: policy
      kind: "*"
    - group: monitoring.coreos.com
      kind: "*"
    - group: rbac.authorization.k8s.io
      kind: "*"
    - group: batch
      kind: "*"
    - group: bitnami.com
      kind: "*"
    - group: keda.sh
      kind: "*"
    - group: cert-manager.io
      kind: "*"
    - group: acme.cert-manager.io
      kind: "*"
