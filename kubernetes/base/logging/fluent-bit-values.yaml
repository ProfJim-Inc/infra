# =============================================================================
# Fluent Bit — DaemonSet, runs on ALL nodes to collect container logs
# No nodeSelector: must run everywhere to capture logs from all pools
# =============================================================================

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    # Drop DEBUG/TRACE logs — ~40-60% volume reduction with no signal loss
    [FILTER]
        Name    grep
        Match   kube.*
        Exclude level (?i)^(debug|trace)$

    # Extract Kubernetes app label into a top-level field for per-service index routing
    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/scripts/set_index.lua
        call    set_index

  outputs: |
    [OUTPUT]
        Name               opensearch
        Match              kube.*
        Host               opensearch-cluster-master.logging.svc.cluster.local
        Port               9200
        Logstash_Format    On
        Logstash_Prefix_Key _index
        Logstash_DateFormat %Y.%m.%d
        Suppress_Type_Name On
        tls                Off
        tls.verify         Off

# Lua script: extracts the 'app' label from Kubernetes metadata and sets _index
# so Fluent Bit writes to per-service daily indices: logs-<service>-<date>
luaScripts:
  set_index.lua: |
    function set_index(tag, timestamp, record)
      local service = "unknown"
      if record["kubernetes"] then
        local labels = record["kubernetes"]["labels"]
        if labels then
          service = labels["app"]
            or labels["app.kubernetes.io/name"]
            or service
        end
      end
      -- sanitize: lowercase, collapse non-alphanumeric runs to hyphens
      service = string.lower(tostring(service)):gsub("[^a-z0-9%-]+", "-")
      record["_index"] = "logs-" .. service
      return 1, timestamp, record
    end

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

tolerations:
  - operator: Exists    # Run on all nodes including tainted ones
