# =============================================================================
# kube-prometheus-stack — System Pool Values
# All components pinned to the system pool (pool: system)
# =============================================================================

# -- Global node targeting: system pool
global:
  nodeSelector:
    pool: system

# =============================================================================
# Grafana
# =============================================================================
grafana:
  nodeSelector:
    pool: system

  adminPassword: ""  # Set via: kubectl create secret generic grafana-admin -n monitoring --from-literal=admin-password=<pass>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.creatium.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.creatium.com

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Install the OpenSearch datasource plugin (community plugin, not bundled)
  plugins:
    - grafana-opensearch-datasource

  # Pre-configured datasources: OpenSearch (logs) and Tempo (traces)
  additionalDataSources:
    - name: OpenSearch
      type: grafana-opensearch-datasource
      access: proxy
      url: http://opensearch-cluster-master.logging.svc.cluster.local:9200
      jsonData:
        database: "logs-*"
        flavor: "opensearch"
        version: "2.0.0"
        timeField: "@timestamp"
        logLevelField: "level"
        logMessageField: "log"
      isDefault: false

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      jsonData:
        tracesToLogsV2:
          datasourceUid: OpenSearch
          tags:
            - key: "app"
            - key: "namespace"
        serviceMap:
          datasourceUid: prometheus
      isDefault: false

  # Pre-load dashboards for our services
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  prometheusSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    retention: 15d
    retentionSize: "10GB"

    # Scrape ServiceMonitors from all namespaces (picks up agent-backend, tts-microservice)
    serviceMonitorNamespaceSelector:
      matchLabels: {}
    serviceMonitorSelector:
      matchLabels: {}

    podMonitorNamespaceSelector:
      matchLabels: {}
    podMonitorSelector:
      matchLabels: {}

# =============================================================================
# Alertmanager
# =============================================================================
alertmanager:
  alertmanagerSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Prometheus Operator — move kubelet Service out of kube-system
# =============================================================================
prometheusOperator:
  nodeSelector:
    pool: system
  # By default the kubelet Service is created in kube-system.
  # Moving it to monitoring avoids needing kube-system in the ArgoCD project.
  kubeletService:
    enabled: true
    namespace: monitoring

# =============================================================================
# Node Exporter — runs on ALL nodes (DaemonSet, no nodeSelector)
# =============================================================================
prometheus-node-exporter:
  nodeSelector: {}

# =============================================================================
# kube-state-metrics
# =============================================================================
kube-state-metrics:
  nodeSelector:
    pool: system
