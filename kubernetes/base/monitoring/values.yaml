# =============================================================================
# kube-prometheus-stack — System Pool Values
# All components pinned to the system pool (pool: system)
# =============================================================================

# -- Global node targeting: system pool
global:
  nodeSelector:
    pool: system

# =============================================================================
# Grafana
# =============================================================================
grafana:
  nodeSelector:
    pool: system

  adminPassword: ""  # Set via: kubectl create secret generic grafana-admin -n monitoring --from-literal=admin-password=<pass>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.creatium.com
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.creatium.com

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Install the OpenSearch datasource plugin (community plugin, not bundled)
  plugins:
    - grafana-opensearch-datasource

  # Pre-configured datasources: OpenSearch (logs) and Tempo (traces)
  additionalDataSources:
    - name: OpenSearch
      type: grafana-opensearch-datasource
      access: proxy
      url: http://opensearch-cluster-master.logging.svc.cluster.local:9200
      jsonData:
        database: "logs-*"
        flavor: "opensearch"
        version: "2.0.0"
        timeField: "@timestamp"
        logLevelField: "level"
        logMessageField: "log"
      isDefault: false

    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3100
      jsonData:
        tracesToLogsV2:
          datasourceUid: OpenSearch
          tags:
            - key: "app"
            - key: "namespace"
        serviceMap:
          datasourceUid: prometheus
      isDefault: false

  # Pre-load dashboards for our services
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  prometheusSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    retention: 15d
    retentionSize: "10GB"

    # Scrape ServiceMonitors from all namespaces (picks up agent-backend, tts-microservice)
    serviceMonitorNamespaceSelector:
      matchLabels: {}
    serviceMonitorSelector:
      matchLabels: {}

    podMonitorNamespaceSelector:
      matchLabels: {}
    podMonitorSelector:
      matchLabels: {}

    # Evaluate PrometheusRules from ALL namespaces — picks up demo-service alerts in production
    ruleNamespaceSelector:
      matchLabels: {}
    ruleSelector:
      matchLabels: {}

# =============================================================================
# Alertmanager
# =============================================================================
alertmanager:
  # Base global routing config.
  # Per-service routing is handled by AlertmanagerConfig CRs in their own namespaces.
  # This config provides the default null receiver and inhibition rules.
  config:
    global:
      resolve_timeout: 5m

    route:
      # Unmatched alerts go to null (silently dropped).
      # AlertmanagerConfig CRs in production/staging pick up service-specific alerts.
      receiver: "null"
      group_by: ["namespace", "alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Watchdog alert from kube-prometheus-stack — always suppress
        - matchers:
            - name: alertname
              value: Watchdog
          receiver: "null"

    receivers:
      - name: "null"

    # Inhibition: if a critical alert fires for the same service, suppress
    # corresponding warning alerts to reduce noise.
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, namespace, service]

  alertmanagerSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Pick up AlertmanagerConfig CRs from all namespaces.
    # Each CR is automatically scoped to alerts from its own namespace.
    alertmanagerConfigSelector:
      matchLabels: {}
    alertmanagerConfigNamespaceSelector:
      matchLabels: {}

# =============================================================================
# Prometheus Operator — move kubelet Service out of kube-system
# =============================================================================
prometheusOperator:
  nodeSelector:
    pool: system
  # By default the kubelet Service is created in kube-system.
  # Moving it to monitoring avoids needing kube-system in the ArgoCD project.
  kubeletService:
    enabled: true
    namespace: monitoring

# =============================================================================
# Node Exporter — runs on ALL nodes (DaemonSet, no nodeSelector)
# =============================================================================
prometheus-node-exporter:
  nodeSelector: {}

# =============================================================================
# kube-state-metrics
# =============================================================================
kube-state-metrics:
  nodeSelector:
    pool: system
