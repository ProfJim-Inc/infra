# =============================================================================
# kube-prometheus-stack — System Pool Values
# All components pinned to the system pool (pool: system)
# =============================================================================

# -- Global node targeting: system pool
global:
  nodeSelector:
    pool: system

# =============================================================================
# Grafana
# =============================================================================
grafana:
  nodeSelector:
    pool: system

  adminPassword: ""  # Set via: kubectl create secret generic grafana-admin -n monitoring --from-literal=admin-password=<pass>
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.172.236.105.207.nip.io
    # TLS disabled — nip.io does not support certificates.
    # Re-enable with proper DNS + cert-manager when switching to *.creatium.com.
    # tls:
    #   - secretName: grafana-tls
    #     hosts:
    #       - grafana.creatium.com

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Install the OpenSearch datasource plugin (community plugin, not bundled)
  plugins:
    - grafana-opensearch-datasource

  # Pre-configured datasources: OpenSearch (logs) and Tempo (traces)
  #
  # IMPORTANT — explicit uid fields:
  #   Grafana assigns a random internal UID to any datasource provisioned without an
  #   explicit uid field.  The datasourceUid references inside Tempo's jsonData must
  #   match the real UID — not the display name.  Setting uid here pins the UID so the
  #   cross-datasource links (trace → logs, service map → Prometheus) always resolve.
  #
  #   kube-prometheus-stack provisions the built-in Prometheus datasource with
  #   uid: prometheus by default, which is why that reference is safe to hardcode.
  additionalDataSources:
    - name: OpenSearch
      type: grafana-opensearch-datasource
      # Pinned UID — referenced below in Tempo's tracesToLogsV2.datasourceUid.
      # Without this, Grafana generates a random UID and the trace→log link silently breaks.
      uid: opensearch
      access: proxy
      url: http://opensearch-cluster-master.logging.svc.cluster.local:9200
      jsonData:
        database: "logs-*"
        flavor: "opensearch"
        version: "2.0.0"
        timeField: "@timestamp"
        logLevelField: "level"
        logMessageField: "log"
      isDefault: false

    - name: Tempo
      type: tempo
      uid: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      jsonData:
        tracesToLogsV2:
          # Must match uid: opensearch above.
          # Grafana uses this to render the "Logs for this span" button in the trace view.
          datasourceUid: opensearch
          tags:
            - key: "app"
            - key: "namespace"
        serviceMap:
          # kube-prometheus-stack sets uid: prometheus on its built-in datasource,
          # so this reference is stable across chart upgrades.
          datasourceUid: prometheus
      isDefault: false

  # Pre-load dashboards for our services
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

# =============================================================================
# Prometheus
# =============================================================================
prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - prometheus.172.236.105.207.nip.io

  prometheusSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    retention: 15d
    retentionSize: "10GB"

    # Scrape ServiceMonitors from all namespaces (picks up agent-backend, tts-microservice)
    serviceMonitorNamespaceSelector:
      matchLabels: {}
    serviceMonitorSelector:
      matchLabels: {}

    podMonitorNamespaceSelector:
      matchLabels: {}
    podMonitorSelector:
      matchLabels: {}

    # Evaluate PrometheusRules from ALL namespaces — picks up demo-service alerts in production
    ruleNamespaceSelector:
      matchLabels: {}
    ruleSelector:
      matchLabels: {}

# =============================================================================
# Alertmanager
# =============================================================================
alertmanager:
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - alertmanager.172.236.105.207.nip.io

  # Base global routing config.
  # Per-service routing is handled by AlertmanagerConfig CRs in their own namespaces.
  # This config provides the default null receiver and inhibition rules.
  config:
    global:
      resolve_timeout: 5m

    route:
      # Unmatched alerts go to null (silently dropped).
      # AlertmanagerConfig CRs in production/staging pick up service-specific alerts.
      receiver: "null"
      group_by: ["namespace", "alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        # Watchdog alert from kube-prometheus-stack — always suppress
        - matchers:
            - name: alertname
              value: Watchdog
          receiver: "null"

    receivers:
      - name: "null"

    # Inhibition: if a critical alert fires for the same service, suppress
    # corresponding warning alerts to reduce noise.
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, namespace, service]

  alertmanagerSpec:
    nodeSelector:
      pool: system

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Pick up AlertmanagerConfig CRs from all namespaces.
    # Each CR is automatically scoped to alerts from its own namespace.
    alertmanagerConfigSelector:
      matchLabels: {}
    alertmanagerConfigNamespaceSelector:
      matchLabels: {}

# =============================================================================
# Kubelet scraping — LKE uses self-signed certs on port 10250
# =============================================================================
kubelet:
  serviceMonitor:
    https: true
    insecureSkipVerify: true
    cAdvisor: true
    cAdvisorMetricRelabelings:
      - sourceLabels: [__name__]
        action: keep
        regex: "container_(cpu_usage_seconds_total|memory_working_set_bytes|network_.*|fs_.*)"

# =============================================================================
# Prometheus Operator — move kubelet Service out of kube-system
# =============================================================================
prometheusOperator:
  nodeSelector:
    pool: system
  # By default the kubelet Service is created in kube-system.
  # Moving it to monitoring avoids needing kube-system in the ArgoCD project.
  kubeletService:
    enabled: true
    namespace: monitoring

# =============================================================================
# Node Exporter — runs on ALL nodes (DaemonSet, no nodeSelector)
# =============================================================================
prometheus-node-exporter:
  nodeSelector: {}

# =============================================================================
# kube-state-metrics
# =============================================================================
kube-state-metrics:
  nodeSelector:
    pool: system
