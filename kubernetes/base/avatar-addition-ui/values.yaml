# =============================================================================
# avatar-addition-ui — Avatar deployment frontend UI
# Same Docker image as avatar-addition, different entrypoint
# =============================================================================
nameOverride: avatar-addition-ui

image:
  repository: ghcr.io/profjim-inc/avatar-addition
  tag: "latest"   # overridden by ArgoCD Image Updater with semver tag

imagePullSecrets:
  - name: ghcr-pull-secret

# Override CMD to run the frontend Flask app instead of the backend API
command: ["gunicorn", "--bind", "0.0.0.0:5801", "--workers", "1", "--chdir", "/app/frontend", "serve_ui:app"]

containerPort: 5801

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 15

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilization: 70

# Externally accessible — operators access the UI through the browser
ingress:
  enabled: true
  className: nginx
  host: avatar-ui.creatium.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
  tls:
    enabled: true
    secretName: avatar-ui-tls

nodeSelector:
  pool: general

commonLabels:
  team: backend
  tier: internal
  cost-center: engineering

serviceMonitor:
  enabled: false

config:
  ENV: "production"
  SERVICE_NAME: "avatar-addition-ui"
  # Backend API URL — accessible via ClusterIP internal DNS
  AVATAR_API_URL: "http://avatar-addition.production.svc.cluster.local"

secretRefs: []
