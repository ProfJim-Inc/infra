apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: judwaa-2d
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: judwaa-2d
spec:
  groups:
    - name: judwaa-2d.availability
      interval: 30s
      rules:
        - alert: Judwaa2dDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment=~"judwaa-2d.*"
              }
            ) == 0
          for: 1m
          labels:
            severity: critical
            service: judwaa-2d
            namespace: production
          annotations:
            summary: "judwaa-2d has no running pods"
            description: >-
              All judwaa-2d replicas are unavailable for > 1 minute.
            runbook: "kubectl rollout status deployment/judwaa-2d -n production"

        - alert: Judwaa2dPodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"judwaa-2d-.*"
              }[15m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            service: judwaa-2d
            namespace: production
          annotations:
            summary: "judwaa-2d pod {{ $labels.pod }} is crash-looping"
            description: >-
              Pod {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times in 15 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"

    - name: judwaa-2d.inference
      interval: 30s
      rules:
        - alert: Judwaa2dHighErrorRate
          expr: |
            (
              sum(rate(synctalk_errors_total[5m]))
              /
              (sum(rate(synctalk_requests_total[5m])) > 0)
            ) > 0.10
          for: 5m
          labels:
            severity: warning
            service: judwaa-2d
            namespace: production
          annotations:
            summary: "judwaa-2d error rate above 10%"
            description: >-
              {{ $value | humanizePercentage }} of inference requests are failing over the last 5 minutes.

        - alert: Judwaa2dSlowInference
          expr: |
            histogram_quantile(
              0.95,
              sum(
                rate(synctalk_inference_duration_seconds_bucket[10m])
              ) by (le)
            ) > 300
          for: 10m
          labels:
            severity: warning
            service: judwaa-2d
            namespace: production
          annotations:
            summary: "judwaa-2d P95 inference latency above 5 minutes"
            description: >-
              95th percentile inference duration is {{ $value | humanizeDuration }}.

        - alert: Judwaa2dGpuMemoryHigh
          expr: |
            synctalk_gpu_memory_used_mb > 14000
          for: 5m
          labels:
            severity: warning
            service: judwaa-2d
            namespace: production
          annotations:
            summary: "judwaa-2d GPU memory usage above 14 GB"
            description: >-
              GPU VRAM usage is {{ $value | printf "%.0f" }} MB. Risk of OOM.
