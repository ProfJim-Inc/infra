# =============================================================================
# AlertmanagerConfig — demo-service Slack routing
#
# Prometheus Operator automatically scopes this config to alerts that carry
# namespace="production" (matching the namespace of this CR).
#
# Routing logic:
#   severity=critical  → #alerts-critical (immediate, also notifies #alerts)
#   severity=warning   → #alerts (grouped, 5-minute batching)
#
# Required secret (create once):
#   kubectl create secret generic alertmanager-slack-secret \
#     -n production \
#     --from-literal=webhook_url=https://hooks.slack.com/services/XXXXX/YYYYY/ZZZZZ
#
# To get a Slack webhook URL:
#   1. Go to https://api.slack.com/apps → Create New App → From scratch
#   2. Enable Incoming Webhooks
#   3. Add webhook to your workspace, select the channel
# =============================================================================
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: demo-service
  namespace: production
  labels:
    app.kubernetes.io/name: demo-service
spec:
  route:
    receiver: slack-warnings
    groupBy:
      - alertname
      - service
    groupWait: 30s         # wait 30s before sending first notification (allows batching)
    groupInterval: 5m      # wait 5m before sending new notifications for the same group
    repeatInterval: 4h     # re-notify every 4h if alert is still firing
    matchers:
      - name: service
        value: demo-service
    routes:
      # Critical alerts also go to #alerts-critical in addition to #alerts.
      # continue: true ensures they still flow to the parent (slack-warnings) receiver.
      - receiver: slack-critical
        matchers:
          - name: severity
            value: critical
        groupWait: 0s       # critical: send immediately, no batching delay
        repeatInterval: 1h  # critical: re-notify every hour
        continue: true

  receivers:
    # ------------------------------------------------------------------
    # Warning channel — receives all demo-service alerts
    # ------------------------------------------------------------------
    - name: slack-warnings
      slackConfigs:
        - apiURL:
            # Secret created manually — see instructions above
            name: alertmanager-slack-secret
            key: webhook_url
          channel: "#alerts"
          sendResolved: true
          iconEmoji: ":warning:"
          title: |
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
          text: |
            {{ range .Alerts }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* `{{ .Labels.severity }}`  |  *Service:* `{{ .Labels.service }}`
            {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
            {{ end }}

    # ------------------------------------------------------------------
    # Critical channel — only critical alerts, faster repeat
    # ------------------------------------------------------------------
    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-secret
            key: webhook_url
          channel: "#alerts-critical"
          sendResolved: true
          iconEmoji: ":rotating_light:"
          title: |
            :rotating_light: [CRITICAL{{ if eq .Status "resolved" }} — RESOLVED{{ end }}] {{ .GroupLabels.alertname }}
          text: |
            {{ range .Alerts }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Service:* `{{ .Labels.service }}`  |  *Namespace:* `{{ .Labels.namespace }}`
            {{ if .Annotations.runbook }}*Immediate action:* `{{ .Annotations.runbook }}`{{ end }}
            {{ end }}
