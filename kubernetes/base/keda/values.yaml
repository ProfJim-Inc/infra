# =============================================================================
# KEDA — System Pool Values
# Event-driven autoscaler for Kubernetes (enables queue-based scaling)
# =============================================================================

operator:
  nodeSelector:
    pool: system
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

metricsServer:
  nodeSelector:
    pool: system
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

webhooks:
  nodeSelector:
    pool: system
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
