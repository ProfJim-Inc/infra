apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: agent-frontend
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: agent-frontend
spec:
  groups:
    - name: agent-frontend.availability
      interval: 30s
      rules:
        - alert: AgentFrontendDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment=~"agent-frontend.*"
              }
            ) == 0
          for: 1m
          labels:
            severity: critical
            service: agent-frontend
            namespace: production
          annotations:
            summary: "agent-frontend has no running pods"
            description: >-
              All agent-frontend replicas are unavailable for > 1 minute.
            runbook: "kubectl rollout status deployment/agent-frontend -n production"

        - alert: AgentFrontendPodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"agent-frontend-.*"
              }[15m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            service: agent-frontend
            namespace: production
          annotations:
            summary: "agent-frontend pod {{ $labels.pod }} is crash-looping"
            description: >-
              Pod {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times in 15 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"

    - name: agent-frontend.slos
      interval: 30s
      rules:
        - alert: AgentFrontendHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum(
                rate(http_request_duration_seconds_bucket{namespace="production", job="agent-frontend"}[5m])
              ) by (le, handler)
            ) > 3.0
          for: 5m
          labels:
            severity: warning
            service: agent-frontend
            namespace: production
          annotations:
            summary: "agent-frontend P99 latency above 3 seconds"
            description: >-
              P99 latency for handler {{ $labels.handler }} is {{ $value | humanizeDuration }}.
