# =============================================================================
# agent-frontend (STAGING) — Node.js/Next.js service
# Reduced resources, single replica min, SHA-based deploys
# =============================================================================
nameOverride: agent-frontend

image:
  repository: ghcr.io/creatium/agent-frontend
  tag: "latest"   # overridden by CI/CD with Git SHA on every merge

containerPort: 3000

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    path: /api/health
    initialDelaySeconds: 10
  readiness:
    enabled: true
    path: /api/health
    initialDelaySeconds: 5

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

ingress:
  enabled: true
  className: nginx
  host: app.stage.creatium.com
  path: /
  tls:
    enabled: true

nodeSelector:
  pool: general

commonLabels:
  team: frontend
  tier: customer-facing
  cost-center: engineering
  environment: staging

config:
  NEXT_PUBLIC_API_URL: "https://api.stage.creatium.com"
