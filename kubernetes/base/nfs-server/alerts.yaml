apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: nfs-server
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: nfs-server
spec:
  groups:
    - name: nfs-server.availability
      interval: 15s
      rules:
        - alert: NfsServerDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment="nfs-server"
              }
            ) == 0
          for: 30s
          labels:
            severity: critical
            service: nfs-server
            namespace: production
          annotations:
            summary: "NFS server has no running pods — all NFS mounts will hang"
            description: >-
              The NFS server pod is unavailable. All pods mounting NFS
              (judwaa-2d) will be stuck waiting for I/O.
            runbook: >-
              1. Check pod status: kubectl get pods -n production -l app=nfs-server
              2. Check PVC: kubectl get pvc judwaa-nfs-storage -n production
              3. If volume stuck on dead node: kubectl delete volumeattachment <name> --force
              4. Then wait for pod to reschedule, or manually delete the pod to trigger reschedule

        - alert: NfsServerPodPending
          expr: |
            kube_pod_status_phase{
              namespace="production",
              pod=~"nfs-server-.*",
              phase="Pending"
            } == 1
          for: 2m
          labels:
            severity: critical
            service: nfs-server
            namespace: production
          annotations:
            summary: "NFS server pod stuck in Pending — likely volume attach issue"
            description: >-
              Pod {{ $labels.pod }} has been Pending for > 2 minutes.
              This usually means the Linode Block Storage volume is still
              attached to a previous node (dead or drained).
            runbook: >-
              1. Check events: kubectl describe pod {{ $labels.pod }} -n production
              2. List volume attachments: kubectl get volumeattachment | grep judwaa
              3. Force detach: kubectl delete volumeattachment <name> --force
              4. Volume will reattach to the new node automatically

        - alert: NfsServerPodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"nfs-server-.*"
              }[10m]
            ) > 2
          for: 0m
          labels:
            severity: critical
            service: nfs-server
            namespace: production
          annotations:
            summary: "NFS server pod is crash-looping"
            description: >-
              Pod {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times in 10 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"
