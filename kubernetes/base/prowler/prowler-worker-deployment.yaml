apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowler-worker
  namespace: production
  labels:
    app.kubernetes.io/name: prowler-worker
    app.kubernetes.io/part-of: prowler
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prowler-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prowler-worker
        app.kubernetes.io/part-of: prowler
        app.kubernetes.io/component: worker
    spec:
      nodeSelector:
        pool: general
      terminationGracePeriodSeconds: 120
      containers:
        - name: prowler-worker
          image: prowlercloud/prowler-api:stable
          command:
            - /home/prowler/docker-entrypoint.sh
            - "worker"
          envFrom:
            - secretRef:
                name: prowler-secrets
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: output
              mountPath: /tmp/prowler_api_output
      volumes:
        - name: output
          emptyDir: {}
