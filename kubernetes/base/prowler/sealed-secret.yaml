# =============================================================================
# Prowler — SealedSecret (ALL environment variables)
# Contains both configuration and credentials. Update via kubeseal without
# redeploying — no downtime.
#
# Generate with:
#   kubectl create secret generic prowler-secrets \
#     --namespace production --dry-run=client -o yaml \
#     --from-literal=PROWLER_API_VERSION="stable" \
#     --from-literal=PROWLER_UI_VERSION="stable" \
#     --from-literal=DJANGO_SETTINGS_MODULE="config.django.production" \
#     --from-literal=DJANGO_ALLOWED_HOSTS="localhost,prowler-api,*" \
#     --from-literal=DJANGO_BIND_ADDRESS="0.0.0.0" \
#     --from-literal=DJANGO_PORT="8080" \
#     --from-literal=DJANGO_DEBUG="False" \
#     --from-literal=DJANGO_LOGGING_FORMATTER="human_readable" \
#     --from-literal=DJANGO_LOGGING_LEVEL="INFO" \
#     --from-literal=DJANGO_WORKERS="4" \
#     --from-literal=DJANGO_ACCESS_TOKEN_LIFETIME="30" \
#     --from-literal=DJANGO_REFRESH_TOKEN_LIFETIME="1440" \
#     --from-literal=DJANGO_CACHE_MAX_AGE="3600" \
#     --from-literal=DJANGO_STALE_WHILE_REVALIDATE="60" \
#     --from-literal=DJANGO_MANAGE_DB_PARTITIONS="True" \
#     --from-literal=DJANGO_BROKER_VISIBILITY_TIMEOUT="86400" \
#     --from-literal=DJANGO_TMP_OUTPUT_DIRECTORY="/tmp/prowler_api_output" \
#     --from-literal=DJANGO_FINDINGS_BATCH_SIZE="1000" \
#     --from-literal=DJANGO_THROTTLE_TOKEN_OBTAIN="50/minute" \
#     --from-literal=POSTGRES_HOST="prowler-postgres" \
#     --from-literal=POSTGRES_PORT="5432" \
#     --from-literal=POSTGRES_DB="prowler_db" \
#     --from-literal=VALKEY_HOST="prowler-valkey" \
#     --from-literal=VALKEY_PORT="6379" \
#     --from-literal=VALKEY_DB="0" \
#     --from-literal=TASK_RETRY_DELAY_SECONDS="0.1" \
#     --from-literal=TASK_RETRY_ATTEMPTS="5" \
#     --from-literal=AUTH_TRUST_HOST="true" \
#     --from-literal=UI_PORT="3000" \
#     --from-literal=AUTH_URL="http://<NODEBALANCER_IP>:30030" \
#     --from-literal=API_BASE_URL="http://prowler-api:8080/api/v1" \
#     --from-literal=NEXT_PUBLIC_API_BASE_URL="http://<NODEBALANCER_IP>:30080/api/v1" \
#     --from-literal=NEXT_PUBLIC_API_DOCS_URL="http://<NODEBALANCER_IP>:30080/api/v1/docs" \
#     --from-literal=AUTH_SECRET="$(openssl rand -base64 32)" \
#     --from-literal=POSTGRES_ADMIN_USER="prowler_admin" \
#     --from-literal=POSTGRES_ADMIN_PASSWORD="<value>" \
#     --from-literal=POSTGRES_USER="prowler" \
#     --from-literal=POSTGRES_PASSWORD="<value>" \
#     --from-literal=DJANGO_SECRETS_ENCRYPTION_KEY="$(openssl rand -base64 32)" \
#     --from-literal=DJANGO_TOKEN_SIGNING_KEY="<rsa-private-key>" \
#     --from-literal=DJANGO_TOKEN_VERIFYING_KEY="<rsa-public-key>" \
#     | kubeseal --controller-name=sealed-secrets \
#               --controller-namespace=kube-system \
#               --format yaml > sealed-secret.yaml
# =============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: prowler-secrets
  namespace: production
  labels:
    app.kubernetes.io/part-of: prowler
spec:
  encryptedData: {}
  template:
    metadata:
      creationTimestamp: null
      name: prowler-secrets
      namespace: production
      labels:
        app.kubernetes.io/part-of: prowler
    type: Opaque
