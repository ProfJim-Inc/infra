# =============================================================================
# tts-api-backend — Multi-provider TTS API with streaming & provider fallback
# =============================================================================
nameOverride: tts-api-backend

image:
  repository: ghcr.io/profjim-inc/tts-api-backend
  tag: "0edff0b"   # overridden by CI/CD with Git SHA on every merge

imagePullSecrets:
  - name: ghcr-pull-secret

containerPort: 8005

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  className: nginx
  host: voices.api.creatium.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: tts-api-backend
    nginx.ingress.kubernetes.io/enable-websocket: "true"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: tts-api-backend-tls

nodeSelector:
  pool: general

commonLabels:
  team: platform
  tier: customer-facing
  cost-center: engineering

serviceMonitor:
  enabled: true
  path: /metrics

config:
  ENV: "production"
  SERVICE_NAME: "tts-api-backend"
  SERVICE_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  TTS_BUFFERING_ENABLED: "true"
  PRONUNCIATION_CACHE_REFRESH_MINUTES: "30"
  OPENSEARCH_USE_SSL: "true"
  OPENSEARCH_VERIFY_CERTS: "true"
  API_KEY_CACHE_TTL_S: "60"

secretRefs:
  - name: tts-api-secrets
    key: MONGODB_CONNECTION_STRING
  - name: tts-api-secrets
    key: ELEVENLABS_API_KEY
  - name: tts-api-secrets
    key: KOKORO_CEREBRIUM_BASE_URL
  - name: tts-api-secrets
    key: KOKORO_CEREBRIUM_API_KEY
  - name: tts-api-secrets
    key: INWORLD_API_KEY
  - name: tts-api-secrets
    key: TTS_API_KEY
  - name: tts-api-secrets
    key: GOOGLE_CREDENTIALS_BASE64
  - name: tts-api-secrets
    key: VOICES_JSON_URL
  - name: tts-api-secrets
    key: AZURE_STORAGE_CONNECTION_STRING
  - name: tts-api-secrets
    key: OPENSEARCH_HOST
  - name: tts-api-secrets
    key: OPENSEARCH_PORT
  - name: tts-api-secrets
    key: OPENSEARCH_USER
  - name: tts-api-secrets
    key: OPENSEARCH_PASSWORD
