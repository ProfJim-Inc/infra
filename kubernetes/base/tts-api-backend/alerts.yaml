apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tts-api-backend
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: tts-api-backend
spec:
  groups:
    - name: tts-api-backend.availability
      interval: 30s
      rules:
        - alert: TtsApiBackendDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment=~"tts-api-backend.*"
              }
            ) == 0
          for: 1m
          labels:
            severity: critical
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend has no running pods"
            description: >-
              All tts-api-backend replicas are unavailable for > 1 minute.
            runbook: "kubectl rollout status deployment/tts-api-backend -n production"

        - alert: TtsApiBackendPodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"tts-api-backend-.*"
              }[15m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend pod {{ $labels.pod }} is crash-looping"
            description: >-
              Pod {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times in 15 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"

    - name: tts-api-backend.slos
      interval: 30s
      rules:
        - alert: TtsApiBackendHighErrorRate
          expr: |
            (
              sum(rate(tts_requests_total{namespace="production", status="error"}[5m]))
              /
              sum(rate(tts_requests_total{namespace="production"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend error rate above 5%"
            description: >-
              {{ $value | humanizePercentage }} of TTS requests are failing over the last 5 minutes.

        - alert: TtsApiBackendHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum(
                rate(tts_request_duration_seconds_bucket{namespace="production"}[5m])
              ) by (le, endpoint)
            ) > 5.0
          for: 5m
          labels:
            severity: warning
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend P99 latency above 5 seconds"
            description: >-
              P99 latency for endpoint {{ $labels.endpoint }} is {{ $value | humanizeDuration }}.

    - name: tts-api-backend.business
      interval: 60s
      rules:
        - alert: TtsApiBackendHighFallbackRate
          expr: |
            (
              rate(tts_provider_fallbacks_total{namespace="production"}[5m])
              /
              sum(rate(tts_requests_total{namespace="production"}[5m]))
            ) > 0.10
          for: 3m
          labels:
            severity: warning
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend provider fallback rate above 10%"
            description: >-
              {{ $value | humanizePercentage }} of requests are requiring provider fallback.

        - alert: TtsApiBackendHighTTFBP95
          expr: |
            histogram_quantile(0.95,
              rate(tts_ttfb_seconds_bucket{namespace="production"}[5m])
            ) > 3.0
          for: 5m
          labels:
            severity: warning
            service: tts-api-backend
            namespace: production
          annotations:
            summary: "tts-api-backend TTFB P95 above 3 seconds"
            description: >-
              95th percentile time-to-first-byte is {{ $value | humanizeDuration }}.
