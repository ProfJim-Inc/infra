# =============================================================================
# add-avatar-agent PrometheusRules
#
# Four alert rules:
#   AddAvatarAgentDown            → critical → Slack #alerts-critical
#   AddAvatarAgentPodCrashLooping → warning  → Slack #alerts
#   AddAvatarAgentHighErrorRate   → warning  → Slack #alerts
#   AddAvatarAgentHighLatencyP99  → warning  → Slack #alerts
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: add-avatar-agent
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: add-avatar-agent
spec:
  groups:
    - name: add-avatar-agent.availability
      interval: 30s
      rules:

        # -------------------------------------------------------------------
        # Alert 1: No running pods — most critical, immediate action needed
        # -------------------------------------------------------------------
        - alert: AddAvatarAgentDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment=~"add-avatar-agent.*"
              }
            ) == 0
          for: 1m
          labels:
            severity: critical
            service: add-avatar-agent
            namespace: production
          annotations:
            summary: "add-avatar-agent has no running pods"
            description: >-
              All add-avatar-agent replicas are unavailable for > 1 minute.
              The management dashboard is inaccessible.
            runbook: "kubectl rollout status deployment/add-avatar-agent -n production"

        # -------------------------------------------------------------------
        # Alert 2: Pod crash-looping — surface restarts before full outage
        # -------------------------------------------------------------------
        - alert: AddAvatarAgentPodCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"add-avatar-agent-.*"
              }[15m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            service: add-avatar-agent
            namespace: production
          annotations:
            summary: "add-avatar-agent pod {{ $labels.pod }} is crash-looping"
            description: >-
              Pod {{ $labels.pod }} (container: {{ $labels.container }}) has
              restarted {{ $value | printf "%.0f" }} times in the last 15 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"

    - name: add-avatar-agent.slos
      interval: 30s
      rules:

        # -------------------------------------------------------------------
        # Alert 3: Error rate > 5% over 5 minutes
        # -------------------------------------------------------------------
        - alert: AddAvatarAgentHighErrorRate
          expr: |
            (
              sum(rate(http_requests_total{namespace="production", service="add-avatar-agent", status_code=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{namespace="production", service="add-avatar-agent"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            service: add-avatar-agent
            namespace: production
          annotations:
            summary: "add-avatar-agent HTTP error rate above 5%"
            description: >-
              {{ $value | humanizePercentage }} of requests are returning 5xx
              over the last 5 minutes.

        # -------------------------------------------------------------------
        # Alert 4: P99 latency > 2s over 5 minutes
        # -------------------------------------------------------------------
        - alert: AddAvatarAgentHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum(
                rate(http_request_duration_seconds_bucket{namespace="production", service="add-avatar-agent"}[5m])
              ) by (le)
            ) > 2.0
          for: 5m
          labels:
            severity: warning
            service: add-avatar-agent
            namespace: production
          annotations:
            summary: "add-avatar-agent P99 latency above 2 seconds"
            description: >-
              P99 latency is {{ $value | humanizeDuration }} over the last 5 minutes.