# =============================================================================
# tts-microservice SealedSecret
#
# Sealed with kubeseal using the cluster's public cert.
# Contains: AZURE_STORAGE_CONNECTION_STRING, OPENSEARCH_HOST,
#           OPENSEARCH_USER, OPENSEARCH_PASS
#
# To re-seal (e.g. after rotating credentials):
#   1. Create a plain secret YAML:
#
#        kubectl create secret generic tts-secrets \
#          -n production \
#          --from-literal=AZURE_STORAGE_CONNECTION_STRING='<connection-string>' \
#          --from-literal=OPENSEARCH_HOST='<host-url>' \
#          --from-literal=OPENSEARCH_USER='<username>' \
#          --from-literal=OPENSEARCH_PASS='<password>' \
#          --dry-run=client -o yaml > /tmp/tts-secrets.yaml
#
#   2. Seal it with kubeseal:
#
#        kubeseal --cert <public-cert.pem> \
#          --format yaml < /tmp/tts-secrets.yaml > sealed-secret.yaml
#
#   3. Replace this file with the output and commit.
#
#   4. Clean up:  rm /tmp/tts-secrets.yaml
# =============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  creationTimestamp: null
  name: tts-secrets
  namespace: production
spec:
  encryptedData:
    AZURE_STORAGE_CONNECTION_STRING: 
    OPENSEARCH_HOST: 
    OPENSEARCH_USER: 
    OPENSEARCH_PASS: 
  template:
    metadata:
      creationTimestamp: null
      name: tts-secrets
      namespace: production
    type: Opaque