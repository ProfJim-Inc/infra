# tts-microservice — GPU-accelerated TTS inference (Kokoro)
nameOverride: tts-microservice

image:
  repository: ghcr.io/creatium/tts-microservice
  tag: "0.1.0"

imagePullSecrets:
  - name: ghcr-pull-secret

# Port 9000 — hardcoded in Dockerfile.api and uvicorn entrypoint
containerPort: 9000

resources:
  requests:
    cpu: 4000m
    memory: 8Gi
    nvidia.com/gpu: "1"
  limits:
    cpu: 12000m
    memory: 24Gi
    nvidia.com/gpu: "1"

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30    # Model is baked into image; startup ~15s
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /readiness            # FastAPI route is /readiness not /ready
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

# GPU pods must use Recreate — RollingUpdate would require 2 GPUs simultaneously.
strategy:
  type: Recreate

# Allow in-flight WS synthesis to finish before pod is killed.
terminationGracePeriodSeconds: 60

# GPU nodes are expensive — no autoscaling, fixed 1 replica
autoscaling:
  enabled: false

replicaCount: 1

ingress:
  enabled: false  # Internal service, called by agent-backend via ClusterIP

# GPU node pool — tainted with nvidia.com/gpu=present:NoSchedule
nodeSelector:
  pool: gpu

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: workload-type
    operator: Equal
    value: gpu
    effect: NoSchedule

commonLabels:
  team: backend
  tier: customer-facing
  cost-center: engineering

serviceMonitor:
  enabled: true
  path: /metrics/

config:
  SERVICE_NAME: "tts-microservice"
  # SERVICE_VERSION is read from the VERSION file baked into the Docker image.
  # It auto-updates on every release — no need to maintain it here.
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  KOKORO_TF32: "true"
  KOKORO_MAX_CONNECTIONS: "50"

# Secrets are managed via SealedSecret (see sealed-secret.yaml).
# The "tts-secrets" K8s Secret is created automatically by the SealedSecret controller.
secretRefs:
  - name: tts-secrets
    key: AZURE_STORAGE_CONNECTION_STRING
  - name: tts-secrets
    key: OPENSEARCH_HOST
  - name: tts-secrets
    key: OPENSEARCH_USER
  - name: tts-secrets
    key: OPENSEARCH_PASS
