# =============================================================================
# RabbitMQ connection string for KEDA TriggerAuthentication
#
# KEDA's rabbitmq scaler needs a full AMQP URI to connect and read queue depth.
# This secret must be created manually (or via SealedSecret):
#
#   kubectl create secret generic voice-pipeline-rabbitmq-connection \
#     -n production \
#     --from-literal=host="amqp://creatium:<password>@rabbitmq.production.svc.cluster.local:5672/"
#
# Replace <password> with the actual RabbitMQ password from rabbitmq-app-credentials.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: voice-pipeline-rabbitmq-connection
  namespace: production
  labels:
    app.kubernetes.io/name: voice-pipeline
type: Opaque
# Value must be set manually — do NOT commit the actual connection string
# stringData:
#   host: "amqp://creatium:<password>@rabbitmq.production.svc.cluster.local:5672/"
