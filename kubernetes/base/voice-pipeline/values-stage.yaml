# =============================================================================
# voice-pipeline (STAGING) — API-based TTS voice generation worker
# Reduced resources for staging validation, single replica
# =============================================================================
nameOverride: voice-pipeline

image:
  repository: ghcr.io/profjim-inc/creatium-voice-pipeline
  tag: "latest"   # overridden by CI/CD with Git SHA on every merge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

containerPort: 8080

resources:
  requests:
    cpu: 2000m
    memory: 4Gi
  limits:
    cpu: 6000m
    memory: 12Gi

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 60

# HPA disabled — KEDA ScaledObject manages replicas based on RabbitMQ queue depth
# See keda-scaledobject-stage.yaml (min 0, max 2)
autoscaling:
  enabled: false

replicaCount: 1   # fallback when KEDA is not active

ingress:
  enabled: false

nodeSelector:
  pool: compute

tolerations:
  - key: "workload-type"
    operator: "Equal"
    value: "compute"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - voice-pipeline
        topologyKey: kubernetes.io/hostname

commonLabels:
  team: backend
  tier: internal
  cost-center: engineering
  environment: staging

serviceMonitor:
  enabled: true
  path: /metrics

config:
  ENV: "staging"
  SERVICE_NAME: "voice-pipeline"
  SERVICE_VERSION: "0.1.0"
  LOG_LEVEL: "DEBUG"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  RABBITMQ_HOST: "rabbitmq.staging.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  MAX_WORKERS: "10"
  BATCH_SIZE: "5"
  TIMEOUT_SECONDS: "300"
  AZURE_QUEUE_NAME: "testing-queue"

secretRefs:
  - name: voice-pipeline-secrets
    key: ELEVENLABS_API_KEY
  - name: voice-pipeline-secrets
    key: AZURE_CONNECTION_STRING
  - name: voice-pipeline-secrets
    key: AZURE_QUEUE_CONNECTION_STRING
  - name: rabbitmq-app-credentials
    key: RABBITMQ_USERNAME
  - name: rabbitmq-app-credentials
    key: RABBITMQ_PASSWORD
  - name: voice-pipeline-secrets
    key: AZURE_BLOB_CONTAINER
  - name: voice-pipeline-secrets
    key: VOICE_INFO_FILE_URL
  - name: voice-pipeline-secrets
    key: VOICE_INFO_FILE_URL_QA
  - name: voice-pipeline-secrets
    key: SPEECH_MODIFIER_URL
  - name: voice-pipeline-secrets
    key: ERROR_LOG_URL_PREFIX
  - name: voice-pipeline-secrets
    key: WEBHOOK_API_KEY
  - name: voice-pipeline-secrets
    key: CARTESIA_API_KEY
  - name: voice-pipeline-secrets
    key: CARTESIA_OPENSEARCH_HOST
  - name: voice-pipeline-secrets
    key: CARTESIA_OPENSEARCH_INDEX_NAME
  - name: voice-pipeline-secrets
    key: CARTESIA_OPENSEARCH_PASSWORD
  - name: voice-pipeline-secrets
    key: CARTESIA_OPENSEARCH_PORT
  - name: voice-pipeline-secrets
    key: CARTESIA_OPENSEARCH_USERNAME
  - name: voice-pipeline-secrets
    key: DEBUG
  - name: voice-pipeline-secrets
    key: ENVIRONMENT
  - name: voice-pipeline-secrets
    key: INWORLD_API_KEY
  - name: voice-pipeline-secrets
    key: KOKORO_API_KEY
  - name: voice-pipeline-secrets
    key: KOKORO_MANAGER_URL
  - name: voice-pipeline-secrets
    key: LOG_FILE_PATH
  - name: voice-pipeline-secrets
    key: LOG_FORMAT
  - name: voice-pipeline-secrets
    key: LOG_GROUP_NAME
