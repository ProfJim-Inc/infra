# =============================================================================
# AlertmanagerConfig — emotion-detection Slack routing
#
# Routing logic:
#   severity=critical  -> #alerts-critical (immediate, also notifies #alerts)
#   severity=warning   -> #alerts (grouped, 5-minute batching)
#
# Uses the shared alertmanager-slack-secret in the production namespace.
# =============================================================================
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: emotion-detection
  namespace: production
  labels:
    app.kubernetes.io/name: emotion-detection
spec:
  route:
    receiver: slack-warnings
    groupBy:
      - alertname
      - service
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    matchers:
      - name: service
        value: emotion-detection
    routes:
      # Critical alerts hit #alerts-critical first, then continue to the
      # catch-all sibling below so they also appear in #alerts.
      - receiver: slack-critical
        matchers:
          - name: severity
            value: critical
        groupWait: 0s
        repeatInterval: 1h
        continue: true
      # Catch-all sibling — receives all alerts (including critical via continue)
      - receiver: slack-warnings

  receivers:
    - name: slack-warnings
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-secret
            key: webhook_url
          channel: "#alerts"
          sendResolved: true
          iconEmoji: ":warning:"
          title: |
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}
          text: |
            {{ range .Alerts }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* `{{ .Labels.severity }}`  |  *Service:* `{{ .Labels.service }}`
            {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
            {{ end }}

    - name: slack-critical
      slackConfigs:
        - apiURL:
            name: alertmanager-slack-secret
            key: webhook_url
          channel: "#alerts-critical"
          sendResolved: true
          iconEmoji: ":rotating_light:"
          title: |
            :rotating_light: [CRITICAL{{ if eq .Status "resolved" }} — RESOLVED{{ end }}] {{ .GroupLabels.alertname }}
          text: |
            {{ range .Alerts }}
            *Summary:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Service:* `{{ .Labels.service }}`  |  *Namespace:* `{{ .Labels.namespace }}`
            {{ if .Annotations.runbook }}*Immediate action:* `{{ .Annotations.runbook }}`{{ end }}
            {{ end }}
