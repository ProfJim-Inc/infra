# =============================================================================
# emotion-detection — Emotion classification API (FastAPI + ONNX Runtime)
# Predicts emotion from text (POST /predict) and audio (POST /predict/audio)
# with WebSocket streaming support (/ws/emotion, /ws/emotion/audio)
# Models: j-hartmann/emotion-english-distilroberta-base (ONNX) + Whisper tiny (STT)
# =============================================================================
nameOverride: emotion-detection

image:
  repository: ghcr.io/profjim-inc/emotion-detection
  tag: "1.0.0"   # managed by ArgoCD Image Updater (semver strategy)

imagePullSecrets:
  - name: ghcr-pull-secret

# Port 9005 — hardcoded in Dockerfile CMD (uvicorn --port 9005)
containerPort: 9005

resources:
  requests:
    cpu: 500m
    memory: 1200Mi   # Steady-state RSS ~1.06GB (PyTorch + Whisper + ONNX + Python)
  limits:
    cpu: 2000m
    memory: 2Gi      # Peak ~1.2-1.4GB during audio transcription; 2Gi gives ~40-60% headroom

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 20    # Allow time for ONNX emotion model + Whisper tiny loading
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health              # No separate /ready endpoint — /health checks model_loaded
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0   # Zero-downtime: new pod must be ready before old is killed

terminationGracePeriodSeconds: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilization: 70

ingress:
  enabled: true
  className: nginx
  host: emotion-detection.creatium.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
  tls:
    enabled: true
    secretName: emotion-detection-tls

# General pool — CPU-only ONNX inference, no GPU needed
nodeSelector:
  pool: general

commonLabels:
  team: platform
  tier: customer-facing
  cost-center: engineering

# Prometheus ServiceMonitor — scrapes /metrics (no trailing slash)
serviceMonitor:
  enabled: true
  path: /metrics

# Non-sensitive config — injected as environment variables via ConfigMap
config:
  SERVICE_NAME: "emotion-detection"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"

# No secrets needed — emotion-detection has no external dependencies
secretRefs: []