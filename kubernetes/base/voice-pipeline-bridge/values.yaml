# =============================================================================
# voice-pipeline-bridge — Azure Queue → RabbitMQ forwarder
# =============================================================================
# Uses the same Docker image as voice-pipeline but runs send_to_rabbit.py
# instead of the main consumer. This process reads from Azure Storage Queue
# and publishes messages to RabbitMQ.
# =============================================================================
nameOverride: voice-pipeline-bridge

image:
  repository: ghcr.io/profjim-inc/creatium-voice-pipeline
  tag: "ab57318"   # overridden by CI/CD with Git SHA on every merge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

# Override the Dockerfile CMD to run the bridge script instead
command: ["python3", "-u", "send_to_rabbit.py"]

# Health check server listens on 8080 (from the bridge's own health thread)
containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Allow in-flight Azure→RabbitMQ publish to complete before kill
terminationGracePeriodSeconds: 30

# Single replica — only one bridge should read from Azure Queue to avoid duplicates
autoscaling:
  enabled: false

replicaCount: 1

ingress:
  enabled: false

nodeSelector:
  pool: general

commonLabels:
  team: backend
  tier: internal
  cost-center: engineering

serviceMonitor:
  enabled: true
  path: /metrics

config:
  ENV: "production"
  SERVICE_NAME: "voice-pipeline-bridge"
  SERVICE_VERSION: "0.1.0"
  LOG_LEVEL: "INFO"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  RABBITMQ_HOST: "rabbitmq.production.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  AZURE_QUEUE_NAME: "testing-queue"

# Reuses the same secrets as voice-pipeline (needs Azure Queue + RabbitMQ creds)
# RabbitMQ credentials come from rabbitmq-app-credentials (not the Bitnami-managed secret)
secretRefs:
  - name: voice-pipeline-secrets
    key: AZURE_QUEUE_CONNECTION_STRING
  - name: rabbitmq-app-credentials
    key: RABBITMQ_USERNAME
  - name: rabbitmq-app-credentials
    key: RABBITMQ_PASSWORD
