# =============================================================================
# voice-pipeline-bridge (STAGING) — Azure Queue → RabbitMQ forwarder
# Same as production but with staging config and reduced resources
# =============================================================================
nameOverride: voice-pipeline-bridge

image:
  repository: ghcr.io/profjim-inc/creatium-voice-pipeline
  tag: "latest"   # overridden by CI/CD with Git SHA on every merge
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

command: ["python3", "-u", "send_to_rabbit.py"]

containerPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

autoscaling:
  enabled: false

replicaCount: 1

ingress:
  enabled: false

nodeSelector:
  pool: general

commonLabels:
  team: backend
  tier: internal
  cost-center: engineering
  environment: staging

serviceMonitor:
  enabled: true
  path: /metrics

config:
  ENV: "staging"
  SERVICE_NAME: "voice-pipeline-bridge"
  SERVICE_VERSION: "0.1.0"
  LOG_LEVEL: "DEBUG"
  OTLP_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4317"
  RABBITMQ_HOST: "rabbitmq.staging.svc.cluster.local"
  RABBITMQ_PORT: "5672"
  AZURE_QUEUE_NAME: "testing-queue"

secretRefs:
  - name: voice-pipeline-secrets
    key: AZURE_QUEUE_CONNECTION_STRING
  - name: rabbitmq-app-credentials
    key: RABBITMQ_USERNAME
  - name: rabbitmq-app-credentials
    key: RABBITMQ_PASSWORD
