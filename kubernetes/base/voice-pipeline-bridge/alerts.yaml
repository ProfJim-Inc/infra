apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: voice-pipeline-bridge
  namespace: production
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: voice-pipeline-bridge
spec:
  groups:
    - name: voice-pipeline-bridge.availability
      interval: 30s
      rules:
        - alert: VoicePipelineBridgeDown
          expr: |
            sum(
              kube_deployment_status_replicas_available{
                namespace="production",
                deployment=~"voice-pipeline-bridge.*"
              }
            ) == 0
          for: 1m
          labels:
            severity: critical
            service: voice-pipeline-bridge
            namespace: production
          annotations:
            summary: "voice-pipeline-bridge has no running pods"
            description: >-
              The Azure Queue → RabbitMQ bridge is down. No messages are being
              forwarded to RabbitMQ. Voice pipeline consumers will starve.
            runbook: "kubectl rollout status deployment/voice-pipeline-bridge -n production"

        - alert: VoicePipelineBridgeCrashLooping
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="production",
                pod=~"voice-pipeline-bridge-.*"
              }[15m]
            ) > 3
          for: 0m
          labels:
            severity: warning
            service: voice-pipeline-bridge
            namespace: production
          annotations:
            summary: "voice-pipeline-bridge pod {{ $labels.pod }} is crash-looping"
            description: >-
              Pod {{ $labels.pod }} has restarted {{ $value | printf "%.0f" }} times in 15 minutes.
            runbook: "kubectl logs {{ $labels.pod }} -n production --previous"

    - name: voice-pipeline-bridge.business
      interval: 60s
      rules:
        - alert: VoicePipelineBridgeHighRetryRate
          expr: |
            rate(voice_pipeline_messages_retried_total[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
            service: voice-pipeline-bridge
            namespace: production
          annotations:
            summary: "voice-pipeline-bridge message retry rate is high"
            description: >-
              Messages are being retried at {{ $value | printf "%.2f" }}/sec.
              This may indicate RabbitMQ publish failures or malformed messages.

        - alert: VoicePipelineBridgeDeadLetterSpike
          expr: |
            increase(voice_pipeline_messages_dead_lettered_total[15m]) > 3
          for: 0m
          labels:
            severity: critical
            service: voice-pipeline-bridge
            namespace: production
          annotations:
            summary: "voice-pipeline-bridge dead-lettered {{ $value | printf \"%.0f\" }} messages in 15 minutes"
            description: >-
              Messages have exceeded max retries and been sent to the error queue.
              Check Azure Queue error queue for failed messages.
