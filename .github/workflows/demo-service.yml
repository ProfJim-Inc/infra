name: demo-service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/demo-service/**"
      - "kubernetes/base/demo-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/demo-service/**"
      - "kubernetes/base/demo-service/**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/profjim-inc/demo-service

jobs:
  # -----------------------------------------------------------------------
  # CI — runs on every PR
  # Validates the build without pushing an image
  # -----------------------------------------------------------------------
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/demo-service/requirements.txt

      - name: Install dependencies
        working-directory: services/demo-service
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: services/demo-service
        # Install ruff only in CI — not a runtime dependency
        run: |
          pip install ruff
          ruff check app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/demo-service
          push: false
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint Helm chart with demo-service values
        uses: azure/setup-helm@v4
        with:
          version: "3.16.x"
      - run: |
          helm lint kubernetes/charts/creatium-service/ \
            -f kubernetes/base/demo-service/values.yaml

  # -----------------------------------------------------------------------
  # CD — runs on merge to main
  # Builds, pushes image, then updates values.yaml with the new Git SHA tag
  # so ArgoCD picks up the new image automatically (GitOps pattern)
  # -----------------------------------------------------------------------
  cd:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # needed to commit the tag update back to the repo
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/demo-service
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: write the new SHA tag into values.yaml so ArgoCD sees the change
      - name: Update image tag in values.yaml
        env:
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"
          sed -i "s|tag:.*# overridden.*|tag: \"${SHORT_SHA}\"   # overridden by CI/CD with Git SHA on every merge|" \
            kubernetes/base/demo-service/values.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/base/demo-service/values.yaml
          git commit -m "chore: update demo-service image tag to ${SHORT_SHA} [skip ci]"
          git push
