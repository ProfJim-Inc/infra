name: demo-service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/demo-service/**"
      - "kubernetes/base/demo-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/demo-service/**"
      - "kubernetes/base/demo-service/**"

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/profjim-inc/demo-service

jobs:
  # -----------------------------------------------------------------------
  # CI — runs on every PR
  # Validates the build without pushing an image
  # -----------------------------------------------------------------------
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/demo-service/requirements.txt

      - name: Install dependencies
        working-directory: services/demo-service
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: services/demo-service
        # Install ruff only in CI — not a runtime dependency
        run: |
          pip install ruff
          ruff check app/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build (no push)
        uses: docker/build-push-action@v6
        with:
          context: services/demo-service
          push: false
          platforms: linux/amd64
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint Helm chart with demo-service values
        uses: azure/setup-helm@v4
        with:
          version: "3.17.1"
      - run: |
          helm lint kubernetes/charts/creatium-service/ \
            -f kubernetes/base/demo-service/values.yaml

  # -----------------------------------------------------------------------
  # CD — runs on merge to main
  # Builds, pushes image, then updates values.yaml with the new Git SHA tag
  # so ArgoCD picks up the new image automatically (GitOps pattern)
  # -----------------------------------------------------------------------
  cd:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write   # needed to commit the tag update back to the repo
      packages: write   # needed to push to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN cannot push to branch-protected main.
          # Use a PAT (INFRA_PUSH_TOKEN) with repo write + bypass branch protection.
          # Fallback to GITHUB_TOKEN if PAT is not set.
          token: ${{ secrets.INFRA_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/demo-service
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # GitOps: write the new SHA tag into staging values so ArgoCD deploys to staging
      # Production deploys are handled separately via the promote-to-prod workflow
      - name: Update staging image tag
        env:
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA::7}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Retry loop to handle concurrent pushes (Image Updater, other workflows)
          # Uses || true to prevent set -e from aborting on failed push
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            git fetch origin main
            git reset --hard origin/main

            sed -i "s|tag:.*# overridden.*|tag: \"${SHORT_SHA}\"   # overridden by CI/CD with Git SHA on every merge|" \
              kubernetes/base/demo-service/values-stage.yaml

            git add kubernetes/base/demo-service/values-stage.yaml
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "chore: update demo-service staging image tag to ${SHORT_SHA} [skip ci]"

            if git push origin main; then
              echo "Push succeeded"
              exit 0
            fi
            echo "Push failed (attempt $i), retrying..."
            sleep 5
          done

          echo "Failed to push after 3 attempts"
          exit 1
