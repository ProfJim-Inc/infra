name: Promote to Production

# Manually triggered workflow that promotes a staging image SHA to production.
# Creates a PR that updates the production values.yaml with the exact image
# SHA that was validated in staging — ensuring artifact identity.
#
# Usage:
#   gh workflow run promote-to-prod.yml \
#     -f service=demo-service \
#     -f sha=abc1234
#
# Or via GitHub UI: Actions → Promote to Production → Run workflow

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name (e.g., demo-service, agent-backend)"
        required: true
        type: choice
        options:
          - agent-backend
          - agent-frontend
          - demo-service
          - voice-pipeline
          - voice-pipeline-bridge
      sha:
        description: "Image SHA tag to promote (e.g., abc1234). Leave empty to use current staging tag."
        required: false
        type: string

jobs:
  promote:
    name: Create Production Promotion PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine SHA to promote
        id: sha
        run: |
          SERVICE="${{ inputs.service }}"
          INPUT_SHA="${{ inputs.sha }}"

          if [ -n "$INPUT_SHA" ]; then
            echo "sha=$INPUT_SHA" >> "$GITHUB_OUTPUT"
            echo "Promoting explicitly provided SHA: $INPUT_SHA"
          else
            # Extract current staging SHA from values-stage.yaml
            STAGE_SHA=$(grep -oP 'tag:\s*"\K[^"]+' "kubernetes/base/${SERVICE}/values-stage.yaml" | head -1)
            if [ -z "$STAGE_SHA" ] || [ "$STAGE_SHA" = "latest" ]; then
              echo "::error::Could not determine staging SHA for $SERVICE. Please provide SHA explicitly."
              exit 1
            fi
            echo "sha=$STAGE_SHA" >> "$GITHUB_OUTPUT"
            echo "Promoting staging SHA: $STAGE_SHA"
          fi

      - name: Update production values.yaml
        env:
          SERVICE: ${{ inputs.service }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          VALUES_FILE="kubernetes/base/${SERVICE}/values.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "::error::Values file not found: $VALUES_FILE"
            exit 1
          fi

          # Update the image tag
          sed -i "s|tag:.*|tag: \"${SHA}\"   # promoted from staging|" "$VALUES_FILE"

          echo "Updated $VALUES_FILE with tag: $SHA"
          git diff "$VALUES_FILE"

      - name: Create promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVICE: ${{ inputs.service }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          BRANCH="promote/${SERVICE}/${SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "kubernetes/base/${SERVICE}/values.yaml"
          git commit -m "promote: ${SERVICE} → production (${SHA})"
          git push origin "$BRANCH"

          gh pr create \
            --title "Promote ${SERVICE} to production (${SHA})" \
            --body "$(cat <<EOF
          ## Production Promotion

          **Service:** \`${SERVICE}\`
          **Image SHA:** \`${SHA}\`
          **Source:** Validated in staging

          ### What this does
          Updates the production \`values.yaml\` to deploy the exact same image that was tested in staging.

          ### Checklist
          - [ ] Verified service is healthy in staging
          - [ ] Checked staging logs for errors
          - [ ] Reviewed staging metrics/dashboards

          ---
          *Auto-generated by [Promote to Production](../actions/workflows/promote-to-prod.yml) workflow*
          EOF
          )" \
            --base main \
            --head "$BRANCH" \
            --label "promotion"
